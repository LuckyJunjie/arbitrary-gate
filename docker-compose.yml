# ============================================================
# arbitrary-gate Docker Compose
# 一键启动完整开发环境
# ============================================================

services:
  # ── MySQL Database ───────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: arbitrary-gate-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: arbitrary_gate
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-apppassword}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - arbitrary-gate-net

  # ── Redis Cache ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: arbitrary-gate-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arbitrary-gate-net

  # ── Backend (Spring Boot) ────────────────────────────────
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: arbitrary-gate-backend
    restart: unless-stopped
    environment:
      # Database
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-appuser}
      DB_PASSWORD: ${MYSQL_PASSWORD:-apppassword}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # AI API (Alibaba DashScope / TongYi Qianwen)
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-your-api-key}
      CONTENT_SAFETY_ENABLED: ${CONTENT_SAFETY_ENABLED:-true}
      CONTENT_SAFETY_API_KEY: ${CONTENT_SAFETY_API_KEY:-}
      # WeChat (optional)
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - arbitrary-gate-net

  # ── Frontend (Vue3 + Nginx) ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arbitrary-gate-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - arbitrary-gate-net

# ── Networks ───────────────────────────────────────────────
networks:
  arbitrary-gate-net:
    driver: bridge

# ── Volumes ─────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
